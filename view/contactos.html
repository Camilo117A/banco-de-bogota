<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Banco de Bogotá</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo-bb">BB</div>
        <div class="logo-texto">Banco de <span>Bogotá</span></div>
    </header>

    <!-- IMAGEN HERO + BOTONES NAV -->
    <div class="hero-wrapper">
        <img src="../img/banco_de_bogota.jpg" alt="Banco de Bogotá">
        <div class="nav-lateral">
            <a href="../index.html" title="Inicio">&#127968;</a>
            <a href="servicios.html" title="Servicios">&#128222;</a>
            <a href="contacto.html" title="Contacto">&#9993;</a>
        </div>
    </div>

    <!-- FORMULARIO DE CONTACTO COMPLETO -->
    <div class="contenedor">
        <div class="pagina-interna">

            <h1>Contacto</h1>

            <div class="form-contacto">
                <div class="form-dos-col">

                    <div class="campo full">
                        <label for="cc">Cédula de Ciudadanía (CC)</label>
                        <input type="number" id="cc" name="cc" placeholder="Número de cédula" min="0">
                    </div>

                    <div class="campo">
                        <label for="nombres">Nombres</label>
                        <input type="text" id="nombres" name="nombres" placeholder="Sus nombres">
                    </div>

                    <div class="campo">
                        <label for="apellidos">Apellidos</label>
                        <input type="text" id="apellidos" name="apellidos" placeholder="Sus apellidos">
                    </div>

                    <div class="campo full">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" placeholder="correo@ejemplo.com">
                    </div>

                    <div class="campo">
                        <label for="usuario">Usuario</label>
                        <input type="text" id="usuario" name="usuario" placeholder="Nombre de usuario">
                    </div>

                    <div class="campo">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="Contraseña">
                    </div>

                    <div class="full">
                        <button type="submit" class="btn-submit">Enviar</button>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>Página web realizada para fines netamente académicos por: Calletana López Baleta &copy; 2026</p>
        <div class="redes">
            <a href="https://www.facebook.com/BancoDeBogota" target="_blank" title="Facebook">f</a>
            <a href="https://pinterest.com" target="_blank" title="Pinterest">p</a>
            <a href="https://www.instagram.com/bancobogota" target="_blank" title="Instagram">in</a>
        </div>
    </footer>

</body>
</html>
